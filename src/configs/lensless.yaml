defaults:
  - model: lensless
  - writer: cometml
  - metrics: image_metrics
  - datasets: digicam
  - dataloader: lensless
  - transforms: null
  - _self_

transforms:
  instance_transforms: {}
  batch_transforms: {}

optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4
  betas: [0.9, 0.999]
lr_scheduler: null
loss_function:
  _target_: src.loss.image_loss
trainer:
  log_step: 5
  n_epochs: 25
  epoch_len: 500
  device_tensors: ["lensed", "labels"] # which tensors should be on device (ex. GPU)
  resume_from: null # null or path to the checkpoint dir with *.pth and config.yaml
  device: auto # device name or "auto"
  override: False # if True, will override the previous run with the same name
  monitor: "off" # "off" or "max/min metric_name", i.e. our goal is to maximize/minimize metric
  save_period: 5 # checkpoint each save_period epochs in addition to the best epoch
  early_stop: ${trainer.n_epochs} # epochs for early stopping
  save_dir: "saved"
  seed: 1
